name: Deploy to Cloudflare

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Apply D1 migrations (production)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          npx wrangler d1 execute myd1_db --remote --file=migrations/0001_create_inquiries.sql
          npx wrangler d1 execute myd1_db --remote --file=migrations/0002_create_menu_items.sql
          npx wrangler d1 execute myd1_db --remote --file=migrations/0003_create_inquiry_types.sql
          npx wrangler d1 execute myd1_db --remote --file=migrations/0004_alter_inquiries_reply_status.sql
          npx wrangler d1 execute myd1_db --remote --file=migrations/0005_schema_migrations.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 migrations (staging)
        if: github.ref == 'refs/heads/develop'
        continue-on-error: true
        run: |
          npx wrangler d1 execute myd1_db_staging --remote --file=migrations/0001_create_inquiries.sql
          npx wrangler d1 execute myd1_db_staging --remote --file=migrations/0002_create_menu_items.sql
          npx wrangler d1 execute myd1_db_staging --remote --file=migrations/0003_create_inquiry_types.sql
          npx wrangler d1 execute myd1_db_staging --remote --file=migrations/0004_alter_inquiries_reply_status.sql
          npx wrangler d1 execute myd1_db_staging --remote --file=migrations/0005_schema_migrations.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare (production)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/develop')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Deploy to Cloudflare (staging)
        if: github.ref == 'refs/heads/develop'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
